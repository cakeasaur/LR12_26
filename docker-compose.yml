version: '3.8'

services:
  app:
    build: .
    container_name: rental_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./rental.db
      - SECRET_KEY=your-secret-key-change-this-in-production
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
