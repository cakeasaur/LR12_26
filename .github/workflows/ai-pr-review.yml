name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-describe:
    name: Описание изменений через AI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Получить diff PR
        id: diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF"
          DIFF=$(git diff "origin/$BASE_REF...HEAD" --stat)
          FULL_DIFF=$(git diff "origin/$BASE_REF...HEAD" -- '*.py' '*.html' '*.yml' '*.json' '*.md' | head -c 12000)
          {
            echo "stat<<DIFF_EOF"
            echo "$DIFF"
            echo "DIFF_EOF"
            echo "full<<DIFF_EOF"
            echo "$FULL_DIFF"
            echo "DIFF_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Запросить описание у AI или показать инструкцию
        id: ai_review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          DIFF_STAT: ${{ steps.diff.outputs.stat }}
          FULL_DIFF: ${{ steps.diff.outputs.full }}
        run: |
          BASE_URL="${OPENAI_BASE_URL:-https://api.openai.com/v1}"
          BASE_URL="${BASE_URL%/}"
          MODEL="${OPENAI_MODEL:-gpt-4o-mini}"

          if [ -n "$OPENAI_API_KEY" ]; then
            PAYLOAD=$(jq -n \
              --arg model  "$MODEL" \
              --arg title  "$PR_TITLE" \
              --arg author "$PR_AUTHOR" \
              --arg stat   "$DIFF_STAT" \
              --arg diff   "$FULL_DIFF" \
              '{
                model: $model,
                max_tokens: 1024,
                messages: [{
                  role: "user",
                  content: ("Напиши release notes на русском для следующих изменений кода.\n\nНазвание: " + $title + "\nАвтор: " + $author + "\n\nФайлы:\n" + $stat + "\n\nDiff (первые 12000 символов):\n```\n" + $diff + "\n```\n\nФормат ответа:\n1. Краткое резюме (1-2 предложения) — что делает этот PR\n2. Ключевые изменения (bullet points)\n3. Потенциальные риски (если есть)\n\nБудь конкретным и лаконичным.")
                }]
              }')

            RESPONSE=$(curl -s "${BASE_URL}/chat/completions" \
              -H "Authorization: Bearer ${OPENAI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            # Шлюз vibecode-claude иногда добавляет префикс "I can't discuss that." — срезаем.
            AI_TEXT=$(echo "$RESPONSE" \
              | jq -r '.choices[0].message.content // .error.message // "Ошибка получения описания от AI."' \
              | sed -E "s/^I can'?t discuss that\.[[:space:]]*//; /./,\$!d")
          else
            AI_TEXT=$(printf '%s\n' \
              '⚠️ **OPENAI_API_KEY не установлен**' \
              '' \
              'Workflow готов, требуется конфигурация:' \
              '' \
              '1. Settings → Secrets and variables → Actions → New repository secret:' \
              '   - `OPENAI_API_KEY` — ключ API' \
              '   - `OPENAI_BASE_URL` — (опционально) базовый URL OpenAI-совместимого шлюза, по умолчанию `https://api.openai.com/v1`' \
              '2. Settings → Secrets and variables → Actions → Variables → New variable:' \
              '   - `OPENAI_MODEL` — имя модели, по умолчанию `gpt-4o-mini`' \
              '' \
              'После настройки workflow будет анализировать PR автоматически.')
          fi

          {
            echo "review<<REVIEW_EOF"
            echo "$AI_TEXT"
            echo "REVIEW_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Оставить комментарий к PR
        uses: actions/github-script@v7
        env:
          AI_REVIEW: ${{ steps.ai_review.outputs.review }}
        with:
          script: |
            const review = process.env.AI_REVIEW || "Описание не получено.";
            const body = `## 🤖 AI-анализ изменений\n\n${review}\n\n---\n*Сгенерировано автоматически через GitHub Actions*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: body,
            });
