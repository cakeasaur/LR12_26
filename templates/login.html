{% extends "base.html" %}
{% block title %}Войти — RentEase{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 440px">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <i class="bi bi-house-heart-fill" style="font-size:2.5rem; color:#e94560"></i>
      <h3 class="fw-bold mt-2">Войти в RentEase</h3>
      <p class="text-muted">Нет аккаунта? <a href="/register" class="text-decoration-none" style="color:#e94560">Зарегистрируйтесь</a></p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Пароль</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Войти
      </button>
    </form>
  </div>
</div>
{% endblock %}
