{% extends "base.html" %}
{% block title %}Регистрация — RentEase{% endblock %}

{% block content %}
<div class="container py-5" style="max-width: 500px">
  <div class="card p-4 p-md-5">
    <div class="text-center mb-4">
      <i class="bi bi-person-plus-fill" style="font-size:2.5rem; color:#e94560"></i>
      <h3 class="fw-bold mt-2">Создать аккаунт</h3>
      <p class="text-muted">Уже есть аккаунт? <a href="/login" class="text-decoration-none" style="color:#e94560">Войдите</a></p>
    </div>

    {% if error %}
    <div class="alert alert-danger"><i class="bi bi-exclamation-triangle me-2"></i>{{ error }}</div>
    {% endif %}

    <form method="post" action="/register">
      <div class="mb-3">
        <label class="form-label fw-semibold">Имя и фамилия</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
          <input type="text" name="full_name" class="form-control border-start-0 ps-0" placeholder="Иван Иванов" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
          <input type="email" name="email" class="form-control border-start-0 ps-0" placeholder="you@example.com" required>
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Телефон <span class="text-muted fw-normal">(необязательно)</span></label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-telephone text-muted"></i></span>
          <input type="tel" name="phone" class="form-control border-start-0 ps-0" placeholder="+7 999 000-00-00">
        </div>
      </div>
      <div class="mb-3">
        <label class="form-label fw-semibold">Пароль</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
          <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="Минимум 8 символов" required minlength="8">
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Я хочу</label>
        <div class="d-flex gap-3">
          <div class="flex-fill">
            <input type="radio" class="btn-check" name="role" id="roleTenant" value="tenant" checked>
            <label class="btn btn-outline-secondary w-100" for="roleTenant">
              <i class="bi bi-search me-1"></i>Снимать
            </label>
          </div>
          <div class="flex-fill">
            <input type="radio" class="btn-check" name="role" id="roleLandlord" value="landlord">
            <label class="btn btn-outline-secondary w-100" for="roleLandlord">
              <i class="bi bi-house me-1"></i>Сдавать
            </label>
          </div>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-person-check me-2"></i>Зарегистрироваться
      </button>
    </form>
  </div>
</div>
{% endblock %}
